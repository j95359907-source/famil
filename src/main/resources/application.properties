spring.application.name=famil

# 本地 MySQL：请先在库里执行建库（见下方 SQL），再启动应用。
# spring.sql.init 会执行 classpath:schema.sql（若表已存在则跳过）。
spring.datasource.url=jdbc:mysql://localhost:3306/famil?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root

spring.sql.init.mode=always
