<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老师管理</title>
  <style>
    body { font-family: Arial, "Microsoft YaHei", sans-serif; margin: 24px; }
    .container { max-width: 980px; }
    .header { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; }
    h1 { margin: 0; font-size: 22px; }
    .sub { color: #666; margin-top: 6px; }
    .card { border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px; margin-top: 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 6px; min-width: 220px; }
    label { font-size: 14px; color: #333; }
    input { padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    button { padding: 10px 14px; border-radius: 8px; border: none; background: #2563eb; color: #fff; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
    th { color: #444; font-weight: 600; }
    .actions { display: flex; align-items: center; gap: 8px; }
    .btn-secondary { background: #6b7280; }
    .btn-secondary:hover { background: #4b5563; }
    .btn-danger { background: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }
    .error { color: #dc2626; margin-top: 10px; min-height: 18px; }
    .hint { color: #666; font-size: 12px; margin-top: 6px; }
    .top-link a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>老师管理</h1>
      <div class="sub">新增、编辑、删除老师信息</div>
    </div>
    <div class="top-link">
      <a href="/index.html">首页</a> |
      <a href="/students.html">学生</a> |
      <a href="/courses.html">课程</a>
      <form action="/logout" method="post" style="display:inline;">
        <button class="btn-secondary" type="submit">退出登录</button>
      </form>
    </div>
  </div>

  <div class="card">
    <h2 style="margin: 0 0 10px 0; font-size: 16px;">老师信息</h2>
    <form id="teacherForm">
      <input type="hidden" id="teacherId" />
      <div class="row">
        <div class="field">
          <label for="name">姓名</label>
          <input id="name" name="name" placeholder="例如：张三" required />
        </div>
        <div class="field">
          <label for="subject">任教科目</label>
          <input id="subject" name="subject" placeholder="例如：数学" required />
          <div class="hint">会保存到数据库字段：`subject`</div>
        </div>
      </div>
      <div style="margin-top: 12px;">
        <button id="submitBtn" type="submit">新增老师</button>
      </div>
      <div class="error" id="errorBox"></div>
    </form>
  </div>

  <div class="card">
    <h2 style="margin: 0 0 10px 0; font-size: 16px;">老师列表</h2>
    <div class="error" id="listErrorBox"></div>
    <table>
      <thead>
      <tr>
        <th style="width: 120px;">ID</th>
        <th>姓名</th>
        <th>任教科目</th>
        <th style="width: 220px;">操作</th>
      </tr>
      </thead>
      <tbody id="teacherTbody"></tbody>
    </table>
  </div>
</div>

<script src="/teachers.js"></script>
</body>
</html>
